name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    # Sábado às 01:30 UTC (22:30 BRT de sexta)
    - cron: "30 1 * * 6"
  push:
    branches: ["main"]

# Permissões mínimas no workflow; jobs elevam quando necessário
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Para publicar SARIF no code scanning
      security-events: write
      # Para publicar resultados em securityscorecards.dev via OIDC
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publica os resultados no OpenSSF para o badge funcionar
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4
        with:
          sarif_file: results.sarif
